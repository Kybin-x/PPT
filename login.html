<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - PPT学习站</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="login-page">

    <!-- 左侧装饰 -->
    <div class="login-hero">
        <div class="hero-content">
            <div class="hero-icon">🎯</div>
            <h1 class="hero-title">PPT学习站</h1>
            <p class="hero-sub">WPS演示专业技能课程</p>
            <div class="hero-features">
                <div class="hero-feature">📖 26节系统课程</div>
                <div class="hero-feature">✏️ 每课练习题</div>
                <div class="hero-feature">🎯 综合实战项目</div>
                <div class="hero-feature">📊 学习进度追踪</div>
            </div>
        </div>
    </div>

    <!-- 右侧表单 -->
    <div class="login-panel">
        <div class="login-box">
            <div class="login-logo">
                <span class="logo-icon">🎯</span>
                <span class="logo-text">PPT学习站</span>
            </div>

            <!-- 标签切换 -->
            <div class="tab-wrap">
                <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">登录</button>
                <button class="tab-btn" id="tab-register" onclick="switchTab('register')">注册</button>
            </div>

            <!-- 登录表单 -->
            <form id="form-login" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>班级</label>
                    <input type="text" id="login-class" placeholder="如：24电商6班" required>
                </div>
                <div class="form-group">
                    <label>学号</label>
                    <input type="text" id="login-sid" placeholder="输入你的学号" required>
                </div>
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="login-name" placeholder="输入你的姓名" required>
                </div>
                <button type="submit" class="btn-submit" id="btn-login">登录</button>
                <div class="form-hint">首次使用请先注册账号</div>
            </form>

            <!-- 注册表单 -->
            <form id="form-register" class="hidden" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>班级 <span class="req">*</span></label>
                    <input type="text" id="reg-class" placeholder="如：24电商6班" required>
                </div>
                <div class="form-group">
                    <label>学号 <span class="req">*</span></label>
                    <input type="text" id="reg-sid" placeholder="你的学号" required>
                </div>
                <div class="form-group">
                    <label>姓名 <span class="req">*</span></label>
                    <input type="text" id="reg-name" placeholder="你的真实姓名" required>
                </div>
                <button type="submit" class="btn-submit" id="btn-register">注册</button>
                <div id="reg-closed-tip" class="closed-tip hidden">
                    🔒 注册已关闭，请联系老师开放注册
                </div>
            </form>

            <!-- 消息区 -->
            <div id="login-msg" class="login-msg hidden"></div>
        </div>
    </div>

</div>

<script src="js/supabase-config.js"></script>
<script src="js/supabase.min.js"></script>
<script src="js/theme.js"></script>

<script>
const { createClient } = supabase;
const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let isRegistrationOpen = true; // 默认开放

// ══════════════════════════════════════════════
//  初始化：检查注册状态
// ══════════════════════════════════════════════
async function init() {
    const { data } = await _supabase
        .from('system_settings')
        .select('value')
        .eq('key', 'registration_open')
        .single();

    isRegistrationOpen = !data || data.value === 'true' || data.value === true;
    updateRegisterUI();
}

function updateRegisterUI() {
    const tip     = document.getElementById('reg-closed-tip');
    const btn     = document.getElementById('btn-register');
    const tabReg  = document.getElementById('tab-register');

    if (!isRegistrationOpen) {
        if (tip) tip.classList.remove('hidden');
        if (btn) { btn.disabled = true; btn.textContent = '注册已关闭'; }
        if (tabReg) tabReg.title = '注册暂时关闭';
    } else {
        if (tip) tip.classList.add('hidden');
        if (btn) { btn.disabled = false; btn.textContent = '注册'; }
    }
}

// ══════════════════════════════════════════════
//  标签切换
// ══════════════════════════════════════════════
function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('form-login').classList.toggle('hidden', !isLogin);
    document.getElementById('form-register').classList.toggle('hidden', isLogin);
    document.getElementById('tab-login').classList.toggle('active', isLogin);
    document.getElementById('tab-register').classList.toggle('active', !isLogin);
    hideMsg();
    updateRegisterUI();
}

// ══════════════════════════════════════════════
//  登录
// ══════════════════════════════════════════════
async function handleLogin(e) {
    e.preventDefault();
    const className = document.getElementById('login-class').value.trim();
    const studentId = document.getElementById('login-sid').value.trim();
    const name      = document.getElementById('login-name').value.trim();
    if (!className || !studentId || !name) return showMsg('请填写完整信息', 'error');

    const btn = document.getElementById('btn-login');
    btn.disabled = true; btn.textContent = '登录中...';

    const { data, error } = await _supabase
        .from('students')
        .select('*')
        .eq('class_name', className)
        .eq('student_id', studentId)
        .eq('name', name)
        .single();

    btn.disabled = false; btn.textContent = '登录';

    if (error || !data) {
        showMsg('登录失败：班级、学号或姓名不匹配，请检查后重试', 'error');
        return;
    }

    // 更新最后活跃时间
    await _supabase.from('students').update({ last_active: new Date().toISOString() }).eq('id', data.id);

    sessionStorage.setItem('currentStudent', JSON.stringify(data));
    window.location.href = 'index.html';
}

// ══════════════════════════════════════════════
//  注册
// ══════════════════════════════════════════════
async function handleRegister(e) {
    e.preventDefault();

    // 再次检查注册状态
    if (!isRegistrationOpen) {
        showMsg('注册已关闭，请联系老师', 'error');
        return;
    }

    const className = document.getElementById('reg-class').value.trim();
    const studentId = document.getElementById('reg-sid').value.trim();
    const name      = document.getElementById('reg-name').value.trim();
    if (!className || !studentId || !name) return showMsg('请填写完整信息', 'error');

    const btn = document.getElementById('btn-register');
    btn.disabled = true; btn.textContent = '注册中...';

    // 检查是否已注册
    const { data: existing } = await _supabase
        .from('students')
        .select('id')
        .eq('class_name', className)
        .eq('student_id', studentId)
        .single();

    if (existing) {
        btn.disabled = false; btn.textContent = '注册';
        showMsg('该学号已注册，请直接登录', 'warning');
        return;
    }

    const { data, error } = await _supabase
        .from('students')
        .insert({
            class_name: className,
            student_id: studentId,
            name: name,
            completed_lessons: [],
            last_active: new Date().toISOString(),
        })
        .select()
        .single();

    btn.disabled = false; btn.textContent = '注册';

    if (error) {
        showMsg('注册失败：' + error.message, 'error');
        return;
    }

    sessionStorage.setItem('currentStudent', JSON.stringify(data));
    showMsg('注册成功！正在跳转...', 'success');
    setTimeout(() => window.location.href = 'index.html', 1200);
}

// ══════════════════════════════════════════════
//  消息显示
// ══════════════════════════════════════════════
function showMsg(text, type = 'info') {
    const el = document.getElementById('login-msg');
    el.textContent = text;
    el.className = `login-msg show ${type}`;
}
function hideMsg() {
    document.getElementById('login-msg').classList.remove('show');
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
