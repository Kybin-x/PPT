<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程学习 - PPT学习站</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/lesson.css">
</head>

<body>
    <header class="header"></header>

    <main class="main-content">

        <div class="page-loading" id="pageLoading">
            <div class="loading-spinner loading-spinner-lg"></div>
            <p>正在加载课程...</p>
        </div>

        <div class="hidden" id="pageError">
            <div class="empty-state">
                <div class="empty-state-icon">😵</div>
                <div class="empty-state-title" id="errorTitle">页面出错了</div>
                <div class="empty-state-desc" id="errorDesc">请检查链接是否正确</div>
                <a href="index.html" class="btn btn-primary mt-lg">返回首页</a>
            </div>
        </div>

        <div class="lesson-layout hidden" id="lessonLayout">

            <div class="lesson-topbar">
                <div class="lesson-breadcrumb">
                    <a href="index.html">📚 课程首页</a>
                    <span class="breadcrumb-sep">/</span>
                    <span class="breadcrumb-module" id="breadcrumbModule">模块</span>
                    <span class="breadcrumb-sep">/</span>
                    <span class="breadcrumb-current" id="breadcrumbCurrent">课程</span>
                </div>
                <div class="lesson-progress-mini">
                    <span class="lesson-progress-label" id="lessonProgressLabel">学习中</span>
                    <div class="lesson-progress-bar-mini">
                        <div class="lesson-progress-fill-mini" id="lessonProgressFill"></div>
                    </div>
                </div>
            </div>

            <div class="lesson-header">
                <div class="lesson-header-left">
                    <div class="lesson-number" id="lessonNumber">1</div>
                    <div class="lesson-header-info">
                        <div class="lesson-module-badge" id="lessonModuleBadge">模块</div>
                        <h1 class="lesson-title" id="lessonTitle">课程标题</h1>
                    </div>
                </div>
                <div class="lesson-header-right">
                    <div class="lesson-status-badge" id="lessonStatusBadge">
                        <span id="lessonStatusIcon">📖</span>
                        <span id="lessonStatusText">学习中</span>
                    </div>
                </div>
            </div>

            <div class="lesson-scenario card" id="lessonScenario">
                <div class="scenario-header">
                    <span class="scenario-icon">🎯</span>
                    <span class="scenario-label">本节任务</span>
                </div>
                <p class="scenario-text" id="scenarioText">任务描述加载中...</p>
            </div>

            <div class="lesson-body">

                <div class="lesson-content-area">

                    <section class="lesson-section" id="lessonKnowledge">
                        <div class="section-anchor" id="knowledge"></div>
                        <h2 class="lesson-section-title">
                            <span class="section-icon">📖</span> 知识讲解
                        </h2>
                        <div class="lesson-knowledge-body" id="knowledgeBody">
                        </div>
                    </section>

                    <section class="lesson-section" id="lessonSteps">
                        <div class="section-anchor" id="steps"></div>
                        <h2 class="lesson-section-title">
                            <span class="section-icon">🔧</span> 操作步骤
                        </h2>
                        <div class="lesson-steps-body" id="stepsBody">
                        </div>
                    </section>

                    <section class="lesson-section" id="lessonTips">
                        <div class="section-anchor" id="tips"></div>
                        <h2 class="lesson-section-title">
                            <span class="section-icon">💡</span> 小贴士 & 易错点
                        </h2>
                        <div class="lesson-tips-body" id="tipsBody">
                        </div>
                    </section>

                    <section class="lesson-section" id="lessonQuiz">
                        <div class="section-anchor" id="quiz"></div>
                        <h2 class="lesson-section-title">
                            <span class="section-icon">✏️</span> 课后练习
                        </h2>
                        <div class="quiz-container" id="quizContainer">
                        </div>
                        <div class="quiz-result hidden" id="quizResult">
                            <div class="quiz-result-icon" id="quizResultIcon">🎉</div>
                            <div class="quiz-result-score">
                                得分：<span id="quizScoreText">0/0</span>
                            </div>
                            <div class="quiz-result-message" id="quizResultMessage">继续加油！</div>
                            <div class="quiz-result-actions">
                                <button class="btn btn-secondary" onclick="resetQuiz()">重新答题</button>
                                <button class="btn btn-primary" id="quizNextBtn" onclick="goNextLesson()">下一课 →</button>
                            </div>
                        </div>
                    </section>

                    <section class="lesson-section" id="lessonPractice">
                        <div class="section-anchor" id="practice"></div>
                        <h2 class="lesson-section-title">
                            <span class="section-icon">🚀</span> 实战任务
                        </h2>
                        <div class="lesson-practice-body" id="practiceBody">
                        </div>
                    </section>

                    <div class="lesson-bottom-actions">
                        <div class="lesson-read-check" id="readCheckArea">
                            <label class="read-checkbox-label">
                                <input type="checkbox" id="readCheckbox" onchange="handleReadCheck()">
                                <span class="read-checkbox-custom"></span>
                                <span>我已认真学习本节内容</span>
                            </label>
                        </div>
                        <div class="lesson-nav-buttons">
                            <button class="btn btn-secondary" id="prevLessonBtn" onclick="goPrevLesson()">
                                ← 上一课
                            </button>
                            <button class="btn btn-primary" id="nextLessonBtn" onclick="goNextLesson()">
                                下一课 →
                            </button>
                        </div>
                    </div>

                </div>

                <aside class="lesson-sidebar">
                    <div class="sidebar-card sidebar-toc">
                        <h4 class="sidebar-card-title">📋 本课目录</h4>
                        <nav class="toc-nav">
                            <a href="#knowledge" class="toc-link active" data-section="knowledge">
                                <span class="toc-dot"></span> 知识讲解
                            </a>
                            <a href="#steps" class="toc-link" data-section="steps">
                                <span class="toc-dot"></span> 操作步骤
                            </a>
                            <a href="#tips" class="toc-link" data-section="tips">
                                <span class="toc-dot"></span> 小贴士
                            </a>
                            <a href="#quiz" class="toc-link" data-section="quiz">
                                <span class="toc-dot"></span> 课后练习
                            </a>
                            <a href="#practice" class="toc-link" data-section="practice">
                                <span class="toc-dot"></span> 实战任务
                            </a>
                        </nav>
                    </div>

                    <div class="sidebar-card sidebar-info">
                        <h4 class="sidebar-card-title">ℹ️ 本课信息</h4>
                        <div class="sidebar-info-list">
                            <div class="sidebar-info-item">
                                <span class="sidebar-info-label">所属模块</span>
                                <span class="sidebar-info-value" id="sidebarModule">-</span>
                            </div>
                            <div class="sidebar-info-item">
                                <span class="sidebar-info-label">课程编号</span>
                                <span class="sidebar-info-value" id="sidebarNumber">-</span>
                            </div>
                            <div class="sidebar-info-item">
                                <span class="sidebar-info-label">阅读状态</span>
                                <span class="sidebar-info-value" id="sidebarReadStatus">未读</span>
                            </div>
                            <div class="sidebar-info-item">
                                <span class="sidebar-info-label">练习得分</span>
                                <span class="sidebar-info-value" id="sidebarQuizScore">-</span>
                            </div>
                        </div>
                    </div>

                    <div class="sidebar-card sidebar-quick-nav">
                        <h4 class="sidebar-card-title">🗂️ 快速跳转</h4>
                        <div class="quick-nav-list" id="quickNavList">
                        </div>
                    </div>
                </aside>
            </div>

        </div>

    </main>

    <div id="footerArea"></div>

    <button class="back-to-top hidden" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="回到顶部">
        ↑
    </button>

    <script src="js/supabase.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/quiz.js"></script>

    <script>
        // ==================== 全局变量 ====================
        let currentChapterId = null;
        let currentChapter = null;
        let currentStudent = null;
        let currentProgress = null;
        let allChapters = [];
        let studentProgress = [];
        let lessonData = null;
        let hasMarkedRead = false;
        let isAdmin = false;

        // ==================== 页面初始化 ====================
        document.addEventListener('DOMContentLoaded', async () => {
            renderHeader('lesson');
            document.getElementById('footerArea').innerHTML = getFooterHtml();

            // 1. 先获取学生登录状态
            currentStudent = getStudentSession();

            // 2. 深度校验管理员身份
            let adminSession = null;
            try {
                adminSession = getAdminSession();
                // 【核心修复】：身份优先级判断
                // 只有在【没有普通学生登录】的前提下，才激活管理员特权
                // 这能保证即使用户登录过管理员且没点退出，只要现在切到了学生号，就无法看未开放内容
                isAdmin = (!!adminSession && !currentStudent);
            } catch (e) { }

            // 获取课程ID
            currentChapterId = parseInt(getUrlParam('id'));
            if (!currentChapterId || isNaN(currentChapterId)) {
                showError('无效的课程链接', '请从课程首页进入学习');
                return;
            }

            // 3. 既不是学生也不是管理员，强制拦截
            if (!currentStudent && !isAdmin) {
                showError('请先登录', '你需要登录后才能学习课程内容');
                document.getElementById('errorDesc').innerHTML =
                    '你需要登录后才能学习课程内容<br><br><a href="login.html" class="btn btn-primary">去登录</a>';
                return;
            }

            // 如果是管理员点击预览，且没有学生会话，则伪装一个管理生身份供程序运行
            if (!currentStudent && isAdmin) {
                currentStudent = { student_id: 'admin', name: '管理员' };
            }

            // 4. 加载数据（传入 session 用于执行管理员专用接口）
            await loadLessonData(adminSession);

            initScrollSpy();
            initBackToTop();
        });

        // ==================== 加载课程数据 ====================
        async function loadLessonData(adminSession) {
            try {
                // 如果是管理员，获取包含未开放章节的全部列表
                if (isAdmin && adminSession) {
                    try {
                        const res = await adminGetChapters(adminSession.username, adminSession.password);
                        if (res && res.success) {
                            allChapters = res.chapters;
                        } else {
                            allChapters = await getOpenChapters();
                        }
                    } catch (e) {
                        allChapters = await getOpenChapters();
                    }
                } else {
                    allChapters = await getOpenChapters();
                }

                // 获取学生进度
                studentProgress = (isAdmin && currentStudent.student_id === 'admin')
                    ? []
                    : await getStudentProgress(currentStudent.student_id);

                // 查找当前章节
                currentChapter = allChapters.find(c => c.id === currentChapterId);

                if (!currentChapter) {
                    showError('课程不存在', '该课程可能还未开放，请返回首页查看');
                    return;
                }

                // 检查是否开放（管理员无视）
                if (!currentChapter.is_open && !isAdmin) {
                    showError('课程未开放', '该课程还未被老师开放，请耐心等待');
                    return;
                }

                // 检查是否解锁（管理员无视）
                if (!isChapterUnlocked(currentChapterId) && !isAdmin) {
                    showError('课程未解锁', '请先完成前一节课程的学习和练习');
                    return;
                }

                // 获取当前进度
                currentProgress = studentProgress.find(p => p.chapter_id === currentChapterId);

                // 加载课程内容 JS
                await loadLessonContent(currentChapterId);

                // 渲染页面
                renderLessonPage();

                // 隐藏加载，显示内容
                document.getElementById('pageLoading').classList.add('hidden');
                document.getElementById('lessonLayout').classList.remove('hidden');

                // 更新页面标题
                document.title = `第${currentChapterId}课 ${currentChapter.title} - PPT学习站`;

            } catch (err) {
                console.error('加载课程失败:', err);
                showError('加载失败', '网络好像出了点问题，请刷新页面重试');
            }
        }

        // ==================== 动态加载课程内容文件 ====================
        function loadLessonContent(chapterId) {
            return new Promise((resolve, reject) => {
                const padded = String(chapterId).padStart(2, '0');
                const script = document.createElement('script');
                script.src = `js/lessons/lesson${padded}.js`;
                script.onload = () => {
                    if (typeof window.lessonData !== 'undefined') {
                        lessonData = window.lessonData;
                        resolve();
                    } else {
                        reject(new Error('课程数据未找到'));
                    }
                };
                script.onerror = () => {
                    reject(new Error('课程文件加载失败'));
                };
                document.head.appendChild(script);
            });
        }

        // ==================== 判断章节是否解锁 ====================
        function isChapterUnlocked(chapterId) {
            if (isAdmin) return true; // 管理员不受进度限制

            const chapter = allChapters.find(c => c.id === chapterId);
            if (!chapter) return false;

            const openChapters = allChapters.filter(c => c.is_open).sort((a, b) => a.sort_order - b.sort_order);
            if (openChapters.length > 0 && openChapters[0].id === chapterId) {
                return true;
            }

            const prevChapter = openChapters
                .filter(c => c.sort_order < chapter.sort_order)
                .sort((a, b) => b.sort_order - a.sort_order)[0];

            if (!prevChapter) return true;

            const prevProgress = studentProgress.find(p => p.chapter_id === prevChapter.id);
            return prevProgress && prevProgress.is_completed;
        }

        // ==================== 渲染课程页面 ====================
        function renderLessonPage() {
            if (!lessonData || !currentChapter) return;

            document.getElementById('breadcrumbModule').textContent = currentChapter.module;
            document.getElementById('breadcrumbCurrent').textContent = currentChapter.title;
            document.getElementById('lessonNumber').textContent = currentChapterId;
            document.getElementById('lessonModuleBadge').textContent = currentChapter.module;
            document.getElementById('lessonModuleBadge').style.background = getModuleColor(currentChapter.module);
            document.getElementById('lessonTitle').textContent = currentChapter.title;

            updateStatusBadge();

            if (lessonData.scenario) document.getElementById('scenarioText').textContent = lessonData.scenario;
            if (lessonData.knowledge) document.getElementById('knowledgeBody').innerHTML = lessonData.knowledge;
            if (lessonData.steps) document.getElementById('stepsBody').innerHTML = lessonData.steps;
            if (lessonData.tips) document.getElementById('tipsBody').innerHTML = lessonData.tips;

            if (lessonData.quiz && lessonData.quiz.length > 0) {
                renderQuiz(lessonData.quiz);
            } else {
                document.getElementById('lessonQuiz').classList.add('hidden');
            }

            if (lessonData.practice) document.getElementById('practiceBody').innerHTML = lessonData.practice;

            if (currentProgress && currentProgress.is_read) {
                document.getElementById('readCheckbox').checked = true;
                hasMarkedRead = true;
            }

            document.getElementById('sidebarModule').textContent = currentChapter.module;
            document.getElementById('sidebarNumber').textContent = '第 ' + currentChapterId + ' 课';
            document.getElementById('sidebarReadStatus').textContent = (currentProgress && currentProgress.is_read) ? '✅ 已读' : '❌ 未读';
            document.getElementById('sidebarQuizScore').textContent = (currentProgress && currentProgress.quiz_total > 0) ? `${currentProgress.quiz_score}/${currentProgress.quiz_total}` : '-';

            updateLessonProgress();
            renderQuickNav();
            renderNavButtons();
        }

        function updateStatusBadge() {
            const icon = document.getElementById('lessonStatusIcon');
            const text = document.getElementById('lessonStatusText');
            const badge = document.getElementById('lessonStatusBadge');

            if (currentProgress && currentProgress.is_completed) {
                icon.textContent = '✅';
                text.textContent = '已完成';
                badge.className = 'lesson-status-badge completed';
            } else if (currentProgress && currentProgress.is_read) {
                icon.textContent = '📖';
                text.textContent = '学习中';
                badge.className = 'lesson-status-badge reading';
            } else {
                icon.textContent = '🆕';
                text.textContent = '新课程';
                badge.className = 'lesson-status-badge new-lesson';
            }
        }

        function updateLessonProgress() {
            let progressPercent = 0;
            let label = '未开始';

            if (currentProgress) {
                if (currentProgress.is_completed) {
                    progressPercent = 100;
                    label = '已完成 ✅';
                } else if (currentProgress.is_read && currentProgress.quiz_total > 0) {
                    progressPercent = 75;
                    label = '已做练习';
                } else if (currentProgress.is_read) {
                    progressPercent = 50;
                    label = '已阅读';
                } else {
                    progressPercent = 10;
                    label = '学习中';
                }
            }

            document.getElementById('lessonProgressFill').style.width = progressPercent + '%';
            document.getElementById('lessonProgressLabel').textContent = label;
        }

        // ==================== 标记已读 ====================
        async function handleReadCheck() {
            const checkbox = document.getElementById('readCheckbox');

            if (checkbox.checked && !hasMarkedRead) {
                hasMarkedRead = true;

                let result = { success: true, progress: { is_completed: true } }; // 管理员直接成功
                if (!isAdmin || currentStudent.student_id !== 'admin') {
                    result = await updateProgress(currentStudent.student_id, currentChapterId, { is_read: true });
                }

                if (result.success || isAdmin) {
                    showToast('已标记为已读 📖', 'success');
                    document.getElementById('sidebarReadStatus').textContent = '✅ 已读';

                    if (!currentProgress) {
                        currentProgress = { chapter_id: currentChapterId, is_read: true, quiz_score: 0, quiz_total: 0, is_completed: false };
                        studentProgress.push(currentProgress);
                    } else {
                        currentProgress.is_read = true;
                    }

                    if (!lessonData.quiz || lessonData.quiz.length === 0) {
                        currentProgress.is_completed = true;
                    } else if (result.progress && result.progress.is_completed) {
                        currentProgress.is_completed = true;
                    }

                    updateStatusBadge();
                    updateLessonProgress();

                    renderQuickNav();
                    renderNavButtons();
                } else {
                    showToast('标记失败，请重试', 'error');
                    checkbox.checked = false;
                    hasMarkedRead = false;
                }
            }
        }

        // ==================== 提交练习题成绩 ====================
        async function submitQuizScore(score, total) {
            let result = { success: true, progress: { is_completed: true } };
            if (!isAdmin || currentStudent.student_id !== 'admin') {
                result = await updateProgress(currentStudent.student_id, currentChapterId, {
                    quiz_score: score,
                    quiz_total: total
                });
            }

            if (result.success || isAdmin) {
                if (!currentProgress) {
                    currentProgress = { chapter_id: currentChapterId, is_read: true, quiz_score: 0, quiz_total: 0, is_completed: false };
                    studentProgress.push(currentProgress);
                }

                currentProgress.quiz_score = Math.max(currentProgress.quiz_score || 0, score);
                currentProgress.quiz_total = total;

                if (result.progress && result.progress.is_completed !== undefined) {
                    currentProgress.is_completed = result.progress.is_completed;
                } else {
                    currentProgress.is_completed = true;
                }

                document.getElementById('sidebarQuizScore').textContent = `${score}/${total}`;

                updateStatusBadge();
                updateLessonProgress();

                renderQuickNav();
                renderNavButtons();

                if (currentProgress.is_completed) {
                    showToast('🎉 恭喜！本节课程已完成！', 'success', 4000);
                }
            }

            return result;
        }

        // ==================== 渲染快速导航 ====================
        function renderQuickNav() {
            const openChapters = allChapters.filter(c => isAdmin || c.is_open).sort((a, b) => a.sort_order - b.sort_order);
            const navEl = document.getElementById('quickNavList');

            let html = '';
            openChapters.forEach(ch => {
                const progress = studentProgress.find(p => p.chapter_id === ch.id);
                const isCompleted = progress && progress.is_completed;
                const isCurrent = ch.id === currentChapterId;

                html += `
                    <a href="lesson.html?id=${ch.id}" 
                       class="quick-nav-item ${isCurrent ? 'current' : ''} ${isCompleted ? 'completed' : ''}"
                       title="${ch.title}">
                        <span class="quick-nav-num">${ch.id}</span>
                        <span class="quick-nav-title">${escapeHtml(ch.title)}</span>
                        ${isCompleted ? '<span class="quick-nav-check">✅</span>' : ''}
                    </a>
                `;
            });

            navEl.innerHTML = html;
        }

        // ==================== 渲染底部导航按钮 ====================
        function renderNavButtons() {
            const openChapters = allChapters.filter(c => isAdmin || c.is_open).sort((a, b) => a.sort_order - b.sort_order);
            const currentIndex = openChapters.findIndex(c => c.id === currentChapterId);

            const prevBtn = document.getElementById('prevLessonBtn');
            const nextBtn = document.getElementById('nextLessonBtn');

            if (currentIndex <= 0) {
                prevBtn.disabled = true;
                prevBtn.textContent = '已是第一课';
            } else {
                prevBtn.disabled = false;
                prevBtn.innerHTML = `← ${openChapters[currentIndex - 1].title}`;
            }

            if (currentIndex >= openChapters.length - 1) {
                nextBtn.disabled = true;
                nextBtn.textContent = '已是最后一课';
            } else {
                nextBtn.disabled = false;
                nextBtn.innerHTML = `${openChapters[currentIndex + 1].title} →`;
            }
        }

        function goPrevLesson() {
            const openChapters = allChapters.filter(c => isAdmin || c.is_open).sort((a, b) => a.sort_order - b.sort_order);
            const currentIndex = openChapters.findIndex(c => c.id === currentChapterId);
            if (currentIndex > 0) {
                window.location.href = `lesson.html?id=${openChapters[currentIndex - 1].id}`;
            }
        }

        function goNextLesson() {
            const openChapters = allChapters.filter(c => isAdmin || c.is_open).sort((a, b) => a.sort_order - b.sort_order);
            const currentIndex = openChapters.findIndex(c => c.id === currentChapterId);

            if (currentIndex < openChapters.length - 1) {
                const nextChapter = openChapters[currentIndex + 1];
                if (isAdmin || isChapterUnlocked(nextChapter.id)) {
                    window.location.href = `lesson.html?id=${nextChapter.id}`;
                } else {
                    showToast('请先完成当前课程的学习和练习', 'warning');
                }
            } else {
                showToast('🎉 你已完成所有课程！', 'success');
            }
        }

        function showError(title, desc) {
            document.getElementById('pageLoading').classList.add('hidden');
            document.getElementById('pageError').classList.remove('hidden');
            document.getElementById('errorTitle').textContent = title;
            document.getElementById('errorDesc').innerHTML = desc;
        }

        function initScrollSpy() {
            const sections = ['knowledge', 'steps', 'tips', 'quiz', 'practice'];
            const tocLinks = document.querySelectorAll('.toc-link');

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.id;
                        tocLinks.forEach(link => {
                            link.classList.toggle('active', link.dataset.section === id);
                        });
                    }
                });
            }, {
                rootMargin: '-80px 0px -60% 0px',
                threshold: 0
            });

            sections.forEach(id => {
                const el = document.getElementById(id);
                if (el) observer.observe(el);
            });

            tocLinks.forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const targetId = link.getAttribute('href').substring(1);
                    const target = document.getElementById(targetId);
                    if (target) {
                        const headerOffset = 80;
                        const elementPosition = target.getBoundingClientRect().top;
                        const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                        window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
                    }
                });
            });
        }

        function initBackToTop() {
            const btn = document.getElementById('backToTop');

            window.addEventListener('scroll', throttle(() => {
                if (window.scrollY > 400) {
                    btn.classList.remove('hidden');
                } else {
                    btn.classList.add('hidden');
                }
            }, 200));
        }
    </script>
</body>

</html>
