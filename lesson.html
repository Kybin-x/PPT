<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程学习 - PPT学习站</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/lesson.css">
</head>
<body>

<!-- ═══ 顶部导航 ═══ -->
<header class="lesson-header">
    <div class="header-inner">
        <div class="header-left">
            <a href="index.html" class="back-btn">← 返回首页</a>
            <div class="lesson-title-wrap">
                <span class="lesson-badge" id="lesson-num-badge">第—课</span>
                <span class="lesson-header-title" id="lesson-header-title">课程加载中...</span>
            </div>
        </div>
        <div class="header-right">
            <span class="user-info" id="header-user-info">—</span>
            <button class="theme-toggle" id="theme-toggle-btn" title="切换主题">🌙</button>
        </div>
    </div>
</header>

<!-- ═══ 主体：左侧内容 + 右侧导航 ═══ -->
<div class="lesson-layout">

    <!-- 左侧主内容 -->
    <main class="lesson-main" id="lesson-main">

        <!-- 任务情境 -->
        <section class="lesson-section" id="section-scenario">
            <div class="section-tag">📋 任务情境</div>
            <div class="scenario-box" id="scenario-content"></div>
        </section>

        <!-- 知识讲解 -->
        <section class="lesson-section" id="section-knowledge">
            <div class="section-tag">📖 知识讲解</div>
            <div class="knowledge-content" id="knowledge-content"></div>
        </section>

        <!-- 操作步骤 -->
        <section class="lesson-section" id="section-steps">
            <div class="section-tag">🛠️ 操作步骤</div>
            <div class="steps-content" id="steps-content"></div>
        </section>

        <!-- 小贴士 -->
        <section class="lesson-section" id="section-tips">
            <div class="section-tag">💡 小贴士</div>
            <div class="tips-content" id="tips-content"></div>
        </section>

        <!-- 练习题 -->
        <section class="lesson-section" id="section-quiz">
            <div class="section-tag">✏️ 练习题</div>
            <div id="quiz-container"></div>
            <div id="quiz-result" class="quiz-result hidden"></div>
            <button class="btn-submit-quiz" id="btn-submit-quiz" onclick="submitQuiz()">提交答案</button>
        </section>

        <!-- 实战任务 -->
        <section class="lesson-section" id="section-practice">
            <div class="section-tag">🎯 实战任务</div>
            <div class="practice-content" id="practice-content"></div>
        </section>

        <!-- 完成按钮区 -->
        <div class="lesson-complete-area" id="complete-area">
            <button class="btn-complete" id="btn-complete" onclick="markComplete()">
                ✅ 标记本课已完成
            </button>
            <div class="lesson-nav-btns" id="lesson-nav-btns">
                <button class="btn-nav btn-prev" id="btn-prev" onclick="goPrev()">← 上一课</button>
                <button class="btn-nav btn-next" id="btn-next" onclick="goNext()">下一课 →</button>
            </div>
        </div>

    </main>

    <!-- 右侧快速跳转 -->
    <aside class="lesson-sidebar" id="lesson-sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">课程目录</span>
            <button class="sidebar-collapse-btn" id="sidebar-toggle" onclick="toggleSidebar()" title="收起/展开">«</button>
        </div>
        <div class="sidebar-body" id="sidebar-body">
            <div id="quick-nav-list" class="quick-nav-list">
                <!-- 由JS生成 -->
            </div>
        </div>
    </aside>

</div>

<!-- 加载遮罩 -->
<div class="loading-mask" id="loading-mask">
    <div class="loading-spinner"></div>
</div>

<!-- Toast -->
<div id="lesson-toast" class="lesson-toast hidden"></div>

<script src="js/supabase-config.js"></script>
<script src="js/supabase.min.js"></script>
<script src="js/theme.js"></script>

<script>
// ══════════════════════════════════════════════
//  全局常量 & 状态
// ══════════════════════════════════════════════
const TOTAL_LESSONS = 26;

const { createClient } = supabase;
const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// URL 参数
const urlParams   = new URLSearchParams(location.search);
const lessonNum   = parseInt(urlParams.get('lesson')) || 1;
const isAdminPreview = urlParams.get('adminPreview') === '1';

// 当前状态（持久化到内存，避免重复读库）
let currentStudent   = null;       // 学生对象
let completedSet     = new Set();  // 已完成课时集合（数字）
let maxAllowed       = TOTAL_LESSONS; // 该班级允许访问的最大课时
let quizAnswers      = {};         // 用户答题
let quizSubmitted    = false;
let lessonData       = null;
let sidebarCollapsed = false;

// ══════════════════════════════════════════════
//  初始化
// ══════════════════════════════════════════════
async function init() {
    showLoading(true);
    try {
        if (isAdminPreview) {
            // 管理员预览模式：不做权限检查
            await loadLessonContent(lessonNum);
            renderSidebar(); // 管理员可见所有
            updateNavButtons();
            document.getElementById('header-user-info').textContent = '管理员预览';
            showLoading(false);
            return;
        }

        // 普通学生模式
        const saved = sessionStorage.getItem('currentStudent');
        if (!saved) { window.location.href = 'login.html'; return; }
        currentStudent = JSON.parse(saved);

        // 读取最新进度（防止多端数据不同步）
        await refreshStudentFromDB();

        // 读取班级课程上限
        await loadClassLimit();

        // 权限检查
        if (lessonNum > maxAllowed) {
            showToast(`⚠️ 本课尚未开放，班级目前开放到第 ${maxAllowed} 课`, 'warning');
            setTimeout(() => window.location.href = 'index.html', 2200);
            showLoading(false);
            return;
        }
        if (lessonNum > 1 && !completedSet.has(lessonNum - 1)) {
            showToast('⚠️ 请先完成上一课的学习', 'warning');
            setTimeout(() => window.location.href = `lesson.html?lesson=${lessonNum - 1}`, 2200);
            showLoading(false);
            return;
        }

        document.getElementById('header-user-info').textContent = `${currentStudent.name} · ${currentStudent.class_name}`;

        await loadLessonContent(lessonNum);
        renderSidebar();
        updateNavButtons();
        updateCompleteButton();

    } catch(e) {
        console.error(e);
        showToast('页面加载出错，请刷新重试', 'error');
    }
    showLoading(false);
}

// ══════════════════════════════════════════════
//  从数据库刷新学生进度
// ══════════════════════════════════════════════
async function refreshStudentFromDB() {
    const { data, error } = await _supabase
        .from('students')
        .select('completed_lessons, last_active')
        .eq('id', currentStudent.id)
        .single();

    if (!error && data) {
        const cl = Array.isArray(data.completed_lessons) ? data.completed_lessons : [];
        completedSet = new Set(cl.map(Number));
        // 同步到 sessionStorage
        currentStudent.completed_lessons = cl;
        sessionStorage.setItem('currentStudent', JSON.stringify(currentStudent));
    } else {
        completedSet = new Set((currentStudent.completed_lessons || []).map(Number));
    }
}

// ══════════════════════════════════════════════
//  读取班级课程上限
// ══════════════════════════════════════════════
async function loadClassLimit() {
    if (!currentStudent?.class_name) return;
    const key = 'class_lesson_limit_' + currentStudent.class_name;
    const { data } = await _supabase
        .from('system_settings')
        .select('value')
        .eq('key', key)
        .single();

    maxAllowed = data ? (parseInt(data.value) || TOTAL_LESSONS) : TOTAL_LESSONS;
}

// ══════════════════════════════════════════════
//  加载课程内容
// ══════════════════════════════════════════════
async function loadLessonContent(num) {
    return new Promise((resolve, reject) => {
        // 移除旧的课程脚本
        const oldScript = document.getElementById('lesson-script');
        if (oldScript) oldScript.remove();
        if (window.lessonData) delete window.lessonData;

        const script = document.createElement('script');
        script.id  = 'lesson-script';
        script.src = `js/lessons/lesson${String(num).padStart(2,'0')}.js?v=${Date.now()}`;
        script.onload = () => {
            if (!window.lessonData) { reject(new Error('lessonData未定义')); return; }
            lessonData = window.lessonData;
            renderLessonContent();
            resolve();
        };
        script.onerror = () => reject(new Error('课程文件加载失败'));
        document.body.appendChild(script);
    });
}

// ══════════════════════════════════════════════
//  渲染课程内容
// ══════════════════════════════════════════════
function renderLessonContent() {
    const d = lessonData;
    document.getElementById('lesson-num-badge').textContent  = `第 ${lessonNum} 课`;
    document.getElementById('lesson-header-title').textContent = getLessonName(lessonNum);
    document.title = `第${lessonNum}课 · PPT学习站`;

    document.getElementById('scenario-content').innerHTML  = d.scenario  || '';
    document.getElementById('knowledge-content').innerHTML = d.knowledge || '';
    document.getElementById('steps-content').innerHTML     = d.steps     || '';
    document.getElementById('tips-content').innerHTML      = d.tips      || '';
    document.getElementById('practice-content').innerHTML  = d.practice  || '';

    renderQuiz(d.quiz || []);
    quizSubmitted = false;
    quizAnswers   = {};
}

// ══════════════════════════════════════════════
//  Quiz 渲染与提交
// ══════════════════════════════════════════════
function renderQuiz(questions) {
    const container = document.getElementById('quiz-container');
    const result    = document.getElementById('quiz-result');
    const submitBtn = document.getElementById('btn-submit-quiz');

    result.classList.add('hidden');
    submitBtn.style.display = questions.length ? '' : 'none';

    container.innerHTML = questions.map((q, i) => {
        const isMultiple = q.type === 'multiple';
        const inputType  = isMultiple ? 'checkbox' : 'radio';
        return `
        <div class="quiz-item" id="quiz-item-${i}">
            <div class="quiz-q"><span class="quiz-num">${i+1}.</span> ${q.question}</div>
            <div class="quiz-options">
                ${q.options.map((opt, j) => `
                    <label class="quiz-option" id="opt-${i}-${j}">
                        <input type="${inputType}" name="q${i}" value="${j}"
                            onchange="recordAnswer(${i}, ${j}, ${isMultiple})"
                            ${isMultiple ? '' : ''}>
                        <span class="option-text">${opt}</span>
                    </label>
                `).join('')}
            </div>
        </div>`;
    }).join('');
}

function recordAnswer(qi, vi, isMultiple) {
    if (quizSubmitted) return;
    if (isMultiple) {
        if (!quizAnswers[qi]) quizAnswers[qi] = new Set();
        const el = document.querySelector(`input[name="q${qi}"][value="${vi}"]`);
        if (el.checked) quizAnswers[qi].add(vi);
        else quizAnswers[qi].delete(vi);
    } else {
        quizAnswers[qi] = vi;
    }
}

function submitQuiz() {
    if (quizSubmitted) return;
    const questions = lessonData?.quiz || [];
    if (!questions.length) return;

    let correct = 0;
    questions.forEach((q, i) => {
        const userAns = quizAnswers[i];
        const isMultiple = q.type === 'multiple';
        let isCorrect = false;

        if (isMultiple) {
            const userSet  = userAns instanceof Set ? [...userAns].sort().join(',') : '';
            const rightSet = [...q.answer].sort().join(',');
            isCorrect = (userSet === rightSet);
        } else {
            isCorrect = (userAns == q.answer);
        }

        if (isCorrect) correct++;

        // 标记选项颜色
        q.options.forEach((_, j) => {
            const label = document.getElementById(`opt-${i}-${j}`);
            if (!label) return;
            const isRight = isMultiple ? q.answer.includes(j) : q.answer == j;
            const userChose = isMultiple
                ? (userAns instanceof Set && userAns.has(j))
                : (userAns == j);

            label.classList.remove('correct', 'wrong', 'missed');
            if (isRight && userChose) label.classList.add('correct');
            else if (!isRight && userChose) label.classList.add('wrong');
            else if (isRight && !userChose) label.classList.add('missed');
        });

        // 显示解析
        const item = document.getElementById(`quiz-item-${i}`);
        let existing = item.querySelector('.quiz-explanation');
        if (existing) existing.remove();
        const exp = document.createElement('div');
        exp.className = 'quiz-explanation';
        exp.innerHTML = `<strong>${isCorrect ? '✅ 正确' : '❌ 错误'}</strong>：${q.explanation || ''}`;
        item.appendChild(exp);
    });

    quizSubmitted = true;
    const pct = Math.round(correct / questions.length * 100);
    const result = document.getElementById('quiz-result');
    result.className = `quiz-result ${pct >= 75 ? 'pass' : 'fail'}`;
    result.innerHTML = `
        <strong>${pct >= 75 ? '🎉 答题完成！' : '📚 继续加油！'}</strong>
        共 ${questions.length} 题，答对 <strong>${correct}</strong> 题（${pct}%）
        ${pct >= 75 ? '' : '<br><small>可以重新阅读知识点后再试哦</small>'}
    `;
    result.classList.remove('hidden');
    document.getElementById('btn-submit-quiz').textContent = '已提交';
    document.getElementById('btn-submit-quiz').disabled = true;
}

// ══════════════════════════════════════════════
//  完成课程
// ══════════════════════════════════════════════
async function markComplete() {
    if (isAdminPreview) { showToast('管理员预览模式，不计入成绩', 'info'); return; }
    if (!currentStudent) return;

    const btn = document.getElementById('btn-complete');
    if (completedSet.has(lessonNum)) {
        showToast('✅ 本课已经完成，可直接学习下一课', 'success');
        return;
    }

    btn.disabled = true;
    btn.textContent = '保存中...';

    completedSet.add(lessonNum);
    const newCompleted = [...completedSet];

    const { error } = await _supabase
        .from('students')
        .update({
            completed_lessons: newCompleted,
            last_active: new Date().toISOString(),
        })
        .eq('id', currentStudent.id);

    if (error) {
        completedSet.delete(lessonNum);
        btn.disabled = false;
        btn.textContent = '✅ 标记本课已完成';
        showToast('保存失败，请重试', 'error');
        return;
    }

    // 同步本地 sessionStorage
    currentStudent.completed_lessons = newCompleted;
    sessionStorage.setItem('currentStudent', JSON.stringify(currentStudent));

    // ★ 关键：立即更新 UI，无需刷新页面
    updateCompleteButton();
    renderSidebar();        // 更新右侧导航的绿色状态
    updateNavButtons();     // 解锁"下一课"按钮

    showToast('🎉 恭喜完成本课！', 'success');
}

function updateCompleteButton() {
    const btn = document.getElementById('btn-complete');
    if (!btn) return;
    const done = isAdminPreview || completedSet.has(lessonNum);
    btn.textContent = done ? '✅ 本课已完成' : '✅ 标记本课已完成';
    btn.disabled    = done;
    btn.classList.toggle('completed', done);
}

// ══════════════════════════════════════════════
//  上下课导航（立即响应，不刷新）
// ══════════════════════════════════════════════
function goPrev() {
    if (lessonNum <= 1) return;
    window.location.href = `lesson.html?lesson=${lessonNum - 1}${isAdminPreview ? '&adminPreview=1' : ''}`;
}

function goNext() {
    const nextNum = lessonNum + 1;
    if (nextNum > TOTAL_LESSONS) return;

    if (!isAdminPreview) {
        // 检查是否可以跳转（当前课已完成 OR 班级允许）
        if (!completedSet.has(lessonNum)) {
            showToast('请先完成本课的学习，再前往下一课', 'warning');
            return;
        }
        if (nextNum > maxAllowed) {
            showToast(`下一课尚未开放，班级目前开放到第 ${maxAllowed} 课`, 'warning');
            return;
        }
    }

    window.location.href = `lesson.html?lesson=${nextNum}${isAdminPreview ? '&adminPreview=1' : ''}`;
}

function updateNavButtons() {
    const prevBtn = document.getElementById('btn-prev');
    const nextBtn = document.getElementById('btn-next');

    if (prevBtn) {
        prevBtn.disabled = (lessonNum <= 1);
        prevBtn.classList.toggle('disabled', lessonNum <= 1);
    }

    if (nextBtn) {
        const nextNum = lessonNum + 1;
        const canNext = isAdminPreview
            || (completedSet.has(lessonNum) && nextNum <= maxAllowed && nextNum <= TOTAL_LESSONS);
        nextBtn.disabled = (nextNum > TOTAL_LESSONS);
        nextBtn.classList.toggle('locked', !isAdminPreview && !completedSet.has(lessonNum));
        nextBtn.textContent = nextNum > TOTAL_LESSONS ? '已是最后一课' : '下一课 →';
    }
}

// ══════════════════════════════════════════════
//  右侧快速导航侧边栏
// ══════════════════════════════════════════════
const LESSON_MODULES = [
    { name: '基础入门',   range: [1,  5]  },
    { name: '文字图片',   range: [6,  10] }, // 按实际模块调整
    { name: '设计进阶',   range: [6,  10] },
    { name: '高效制作',   range: [11, 15] },
    { name: '动画与切换', range: [16, 18] },
    { name: '放映与输出', range: [19, 20] },
    { name: 'WPS特色功能',range: [21, 24] },
    { name: '综合实战',   range: [25, 26] },
];

// 精确的课程模块映射
const LESSON_MODULE_MAP = {
    1:'基础入门', 2:'基础入门', 3:'基础入门', 4:'基础入门', 5:'基础入门',
    6:'设计进阶', 7:'设计进阶', 8:'设计进阶', 9:'设计进阶', 10:'设计进阶',
    11:'高效制作', 12:'高效制作', 13:'高效制作', 14:'高效制作', 15:'高效制作',
    16:'动画与切换', 17:'动画与切换', 18:'动画与切换',
    19:'放映与输出', 20:'放映与输出',
    21:'WPS特色功能', 22:'WPS特色功能', 23:'WPS特色功能', 24:'WPS特色功能',
    25:'综合实战', 26:'综合实战',
};

const LESSON_NAMES = [
    '','初识WPS演示','新建与基本操作','文字排版','插入图片','形状与SmartArt',
    '配色基础','版式与布局','图表制作','表格设计','多媒体嵌入',
    '对齐与规范','素材处理','统一风格','审阅与协作','打包与分享',
    '幻灯片切换效果','元素动画效果','排练计时与演讲者视图',
    '放映设置与演示技巧','PPT导出为多种格式',
    'WPS AI智能功能','云文档与多端同步','稻壳模板与资源库','母版设计',
    '综合实战一','综合实战二',
];

function getLessonName(n) { return LESSON_NAMES[n] || `第${n}课`; }

function renderSidebar() {
    const list = document.getElementById('quick-nav-list');
    if (!list) return;

    // 确定实际显示数量（管理员看全部，学生看到maxAllowed）
    const visibleMax = isAdminPreview ? TOTAL_LESSONS : maxAllowed;

    // 按模块分组
    const modules = {};
    for (let n = 1; n <= visibleMax; n++) {
        const mod = LESSON_MODULE_MAP[n] || '其他';
        if (!modules[mod]) modules[mod] = [];
        modules[mod].push(n);
    }

    let html = '';
    for (const [modName, lessons] of Object.entries(modules)) {
        html += `<div class="nav-module">
            <div class="nav-module-title">${modName}</div>`;
        lessons.forEach(n => {
            const done    = isAdminPreview || completedSet.has(n);
            const current = (n === lessonNum);
            const locked  = !isAdminPreview && n > 1 && !completedSet.has(n - 1);
            let cls = 'nav-lesson-item';
            if (current) cls += ' current';
            if (done)    cls += ' done';
            if (locked)  cls += ' locked';

            html += `<div class="${cls}" onclick="navToLesson(${n}, ${locked})" title="${getLessonName(n)}">
                <span class="nav-num">${n}</span>
                <span class="nav-name">${getLessonName(n)}</span>
                <span class="nav-status">${done ? '✓' : (locked ? '🔒' : '')}</span>
            </div>`;
        });
        html += '</div>';
    }

    list.innerHTML = html;

    // 自动滚动到当前课
    setTimeout(() => {
        const cur = list.querySelector('.current');
        if (cur) cur.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }, 100);
}

function navToLesson(n, locked) {
    if (locked && !isAdminPreview) {
        showToast('请先完成上一课的学习', 'warning');
        return;
    }
    if (n === lessonNum) return;
    window.location.href = `lesson.html?lesson=${n}${isAdminPreview ? '&adminPreview=1' : ''}`;
}

// 侧边栏折叠
function toggleSidebar() {
    sidebarCollapsed = !sidebarCollapsed;
    const sidebar = document.getElementById('lesson-sidebar');
    const toggle  = document.getElementById('sidebar-toggle');
    const body    = document.getElementById('sidebar-body');
    sidebar.classList.toggle('collapsed', sidebarCollapsed);
    toggle.textContent = sidebarCollapsed ? '»' : '«';
    if (body) body.style.display = sidebarCollapsed ? 'none' : '';
}

// ══════════════════════════════════════════════
//  工具函数
// ══════════════════════════════════════════════
function showLoading(show) {
    document.getElementById('loading-mask').style.display = show ? 'flex' : 'none';
}

let _toastTimer = null;
function showToast(msg, type = 'info') {
    const t = document.getElementById('lesson-toast');
    t.textContent = msg;
    t.className = `lesson-toast show ${type}`;
    if (_toastTimer) clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ══════════════════════════════════════════════
//  主题按钮
// ══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('theme-toggle-btn');
    if (btn && window._themeManager) {
        btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
        btn.onclick = () => {
            window._themeManager.toggle();
            btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
        };
    }
});

// ══════════════════════════════════════════════
//  启动
// ══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
