<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模块一测验 · PPT闪光课堂</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    /* 测验页专属微调 */
    body { background: var(--bg); }
  </style>
</head>
<body>

  <!-- ==========================================
       导航栏
       ========================================== -->
  <nav class="navbar">
    <a href="../../index.html" class="nav-logo">
      <span class="logo-icon">✨</span>PPT闪光课堂
    </a>

    <button class="nav-toggle" id="navToggle" aria-label="菜单">
      <span></span><span></span><span></span>
    </button>

    <ul class="nav-menu" id="navMenu">
      <li class="nav-item">
        <a href="../../index.html" class="nav-link">🏠 首页</a>
      </li>
      <li class="nav-item has-dropdown">
        <span class="nav-link">📚 课程模块 ▾</span>
        <div class="dropdown-menu">
          <div class="dropdown-header">七大学习模块</div>
          <a class="dropdown-item active" href="1-1.html">
            <span class="item-icon">📁</span>模块一：初识演示文稿
          </a>
          <a class="dropdown-item" href="../module2/2-1.html">
            <span class="item-icon">🎨</span>模块二：设计基础
          </a>
          <a class="dropdown-item" href="../module3/3-1.html">
            <span class="item-icon">🖼️</span>模块三：图文混排
          </a>
          <a class="dropdown-item" href="../module4/4-1.html">
            <span class="item-icon">🎬</span>模块四：动画与切换
          </a>
          <a class="dropdown-item" href="../module5/5-1.html">
            <span class="item-icon">📊</span>模块五：表格与图表
          </a>
          <a class="dropdown-item" href="../module6/6-1.html">
            <span class="item-icon">🎤</span>模块六：演讲与放映
          </a>
          <a class="dropdown-item" href="../module7/7-1.html">
            <span class="item-icon">🏆</span>模块七：综合实践
          </a>
        </div>
      </li>
      <li class="nav-item">
        <a href="../../pages/download.html" class="nav-link">📥 素材下载</a>
      </li>
    </ul>

    <div id="navUserDisplay"></div>
  </nav>

  <!-- ==========================================
       测验头部
       ========================================== -->
  <div class="quiz-page">
    <div class="quiz-header">
      <div class="container">
        <!-- 面包屑 -->
        <div style="
          display:flex;
          align-items:center;
          justify-content:center;
          gap:0.4rem;
          font-size:0.82rem;
          color:rgba(255,255,255,0.75);
          margin-bottom:0.8rem;
          flex-wrap:wrap;
        ">
          <a href="../../index.html"
             style="color:rgba(255,255,255,0.75);">🏠 首页</a>
          <span>›</span>
          <a href="1-1.html"
             style="color:rgba(255,255,255,0.75);">模块一</a>
          <span>›</span>
          <span style="color:white;font-weight:600;">模块测验</span>
        </div>

        <div class="quiz-header-title">📝 模块一知识测验</div>
        <div class="quiz-header-sub">
          初识演示文稿 · 共 ${QUIZ_CONFIG.QUESTION_COUNT} 题 · 随机出题
        </div>

        <!-- 说明卡片 -->
        <div style="
          display:inline-flex;
          align-items:center;
          gap:1.5rem;
          background:rgba(255,255,255,0.15);
          border:1.5px solid rgba(255,255,255,0.25);
          border-radius:var(--radius-md);
          padding:0.7rem 1.5rem;
          margin-top:1rem;
          font-size:0.82rem;
          color:rgba(255,255,255,0.9);
          flex-wrap:wrap;
          justify-content:center;
        ">
          <span>🔘 单选题</span>
          <span>⚖️ 判断题</span>
          <span>🔗 连线题</span>
          <span>🏆 答对得1分</span>
        </div>
      </div>

      <!-- 波浪 -->
      <div class="quiz-header-wave">
        <svg viewBox="0 0 1440 40" preserveAspectRatio="none">
          <path d="M0,20 C360,40 1080,0 1440,20 L1440,40 L0,40 Z"
                fill="#F8F7FF"/>
        </svg>
      </div>
    </div>

    <!-- ==========================================
         测验主体容器
         ========================================== -->
    <div class="quiz-body">
      <div id="quizContainer">
        <!-- 测验内容由JS动态生成 -->
        <div style="text-align:center;padding:3rem;color:var(--text-light);">
          <div style="font-size:2.5rem;margin-bottom:0.8rem;">⏳</div>
          <div>题目加载中...</div>
        </div>
      </div>
    </div>

  </div><!-- end .quiz-page -->

  <!-- ==========================================
       用户信息弹窗
       ========================================== -->
  <div class="modal-overlay" id="userModal">
    <div class="modal-box">
      <div class="modal-icon">🎓</div>
      <div class="modal-title">开始测验前</div>
      <div class="modal-subtitle">请先登录，方便记录你的学习成绩 📊</div>
      <form class="modal-form" id="userForm">
        <div class="form-group">
          <label class="form-label" for="studentId">学号</label>
          <input
            type="text"
            id="studentId"
            class="form-input"
            placeholder="请输入你的学号"
            maxlength="20"
            autocomplete="off"
          >
        </div>
        <div class="form-group">
          <label class="form-label" for="studentName">姓名</label>
          <input
            type="text"
            id="studentName"
            class="form-input"
            placeholder="请输入你的姓名"
            maxlength="10"
            autocomplete="off"
          >
        </div>
        <button type="submit" class="btn-start">
          🚀 开始测验
        </button>
      </form>
    </div>
  </div>

  <!-- Toast容器 -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ==========================================
       脚本引入
       ========================================== -->
  <script src="../../js/main.js"></script>
  <script src="questions.js"></script>
  <script src="../../js/quiz.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 等待用户登录后启动测验
      function startWhenReady() {
        if (UserManager.isLoggedIn()) {
          createQuiz(MODULE1_QUESTIONS, 'module1_quiz', 'quizContainer');
        } else {
          // 每200ms检查一次是否登录
          setTimeout(startWhenReady, 200);
        }
      }
      startWhenReady();
    });
  </script>

</body>
</html>
