<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - PPT学习站</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <link rel="stylesheet" href="css/global.css">
    <style>
        /* ==================== 管理员登录页样式 ==================== */
        .admin-login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: calc(var(--header-height) + var(--space-lg)) var(--space-lg) var(--space-lg);
            position: relative;
        }

        /* 背景装饰 */
        .admin-login-page::before {
            content: '';
            position: fixed;
            top: -300px;
            right: -300px;
            width: 600px;
            height: 600px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.04;
            pointer-events: none;
        }

        .admin-login-page::after {
            content: '';
            position: fixed;
            bottom: -200px;
            left: -200px;
            width: 500px;
            height: 500px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.04;
            pointer-events: none;
        }

        .admin-login-card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-light);
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        /* 顶部装饰条 */
        .admin-login-top {
            height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
            background-size: 200% 100%;
            animation: gradientMove 4s ease infinite;
        }

        @keyframes gradientMove {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        .admin-login-body {
            padding: var(--space-2xl);
        }

        /* 头像区 */
        .admin-avatar-area {
            text-align: center;
            margin-bottom: var(--space-xl);
        }

        .admin-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            margin: 0 auto var(--space-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.3);
        }

        .admin-avatar-area h2 {
            font-size: var(--text-2xl);
            font-weight: 800;
            margin-bottom: var(--space-xs);
        }

        .admin-avatar-area p {
            font-size: var(--text-sm);
            color: var(--text-muted);
            margin: 0;
        }

        /* 表单 */
        .admin-login-form .form-group {
            margin-bottom: var(--space-lg);
        }

        .admin-login-form .form-input {
            padding: 14px 16px;
            border-radius: var(--radius-md);
            border: 2px solid var(--border-color);
            transition: all var(--transition-fast);
        }

        .admin-login-form .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.1);
        }

        /* 密码输入框容器 */
        .password-wrapper {
            position: relative;
        }

        .password-wrapper .form-input {
            padding-right: 48px;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-size: 16px;
        }

        .password-toggle:hover {
            color: var(--primary);
            background: var(--primary-light);
        }

        /* 登录按钮 */
        .admin-login-btn {
            width: 100%;
            padding: 14px;
            font-size: var(--text-base);
            border-radius: var(--radius-md);
        }

        .admin-login-btn-text,
        .admin-login-btn-loading {
            display: inline-flex;
            align-items: center;
            gap: var(--space-sm);
        }

        /* 底部提示 */
        .admin-login-footer {
            text-align: center;
            margin-top: var(--space-xl);
            padding-top: var(--space-lg);
            border-top: 1px solid var(--border-light);
        }

        .admin-login-footer a {
            color: var(--text-muted);
            font-size: var(--text-sm);
            transition: color var(--transition-fast);
        }

        .admin-login-footer a:hover {
            color: var(--primary);
        }

        /* 错误提示动画 */
        .admin-login-error {
            display: none;
            padding: var(--space-md);
            background: var(--error-light);
            border: 1px solid var(--error);
            border-radius: var(--radius-md);
            color: var(--error);
            font-size: var(--text-sm);
            text-align: center;
            margin-bottom: var(--space-lg);
            animation: shakeError 0.4s ease;
        }

        .admin-login-error.show {
            display: block;
        }

        @keyframes shakeError {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }

        /* 安全锁图标动画 */
        .lock-animation {
            display: inline-block;
            animation: lockPulse 2s ease-in-out infinite;
        }

        @keyframes lockPulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .admin-login-body {
                padding: var(--space-lg);
            }

            .admin-avatar {
                width: 60px;
                height: 60px;
                font-size: 26px;
            }

            .admin-avatar-area h2 {
                font-size: var(--text-xl);
            }
        }

        /* 深色模式 */
        [data-theme="dark"] .admin-login-card {
            border-color: var(--border-color);
        }

        [data-theme="dark"] .admin-login-form .form-input {
            background: var(--bg-body);
        }

        [data-theme="dark"] .admin-login-error {
            background: var(--error-light);
            border-color: rgba(239, 68, 68, 0.3);
        }
    </style>
</head>

<body>
    <!-- 导航栏 -->
    <header class="header"></header>

    <!-- 主内容 -->
    <main class="admin-login-page">
        <div class="admin-login-card">
            <div class="admin-login-top"></div>
            <div class="admin-login-body">

                <!-- 头像区 -->
                <div class="admin-avatar-area">
                    <div class="admin-avatar lock-animation">🔐</div>
                    <h2>管理员登录</h2>
                    <p>PPT学习站后台管理系统</p>
                </div>

                <!-- 错误提示 -->
                <div class="admin-login-error" id="loginError"></div>

                <!-- 登录表单 -->
                <form class="admin-login-form" id="adminLoginForm" onsubmit="return false;">
                    <div class="form-group">
                        <label class="form-label" for="adminUsername">
                            <span>👤</span> 用户名
                        </label>
                        <input type="text" id="adminUsername" class="form-input" placeholder="请输入管理员用户名" maxlength="30"
                            autocomplete="username" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="adminPassword">
                            <span>🔑</span> 密码
                        </label>
                        <div class="password-wrapper">
                            <input type="password" id="adminPassword" class="form-input" placeholder="请输入密码"
                                maxlength="50" autocomplete="current-password" required>
                            <button type="button" class="password-toggle" onclick="togglePasswordVisibility()"
                                title="显示/隐藏密码">
                                <span id="passwordToggleIcon">👁️</span>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary admin-login-btn" id="adminLoginBtn"
                        onclick="handleAdminLoginSubmit()">
                        <span class="admin-login-btn-text" id="adminBtnText">🔓 登录管理后台</span>
                        <span class="admin-login-btn-loading hidden" id="adminBtnLoading">
                            <span class="loading-spinner"></span> 验证中...
                        </span>
                    </button>
                </form>

                <!-- 底部返回 -->
                <div class="admin-login-footer">
                    <a href="index.html">← 返回课程首页</a>
                </div>

            </div>
        </div>
    </main>

    <!-- Supabase CDN -->
   <script src="js/supabase.min.js"></script>
    <!-- 项目脚本 -->
    <script src="js/supabase-config.js"></script>
    <script src="js/theme.js"></script>

    <script>
        // ==================== 页面初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            // 简单导航（无用户信息）
            const header = document.querySelector('.header');
            header.innerHTML = `
                <div class="header-inner">
                    <div class="header-left">
                        <a href="index.html" class="logo">
                            <div class="logo-icon"></div>
                            <span class="logo-text">PPT学习站</span>
                        </a>
                    </div>
                    <div class="header-right">
                        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
                            <span class="icon-sun">☀️</span>
                            <span class="icon-moon">🌙</span>
                        </button>
                    </div>
                </div>
            `;

            // 如果已登录，直接跳转管理页
            const admin = getAdminSession();
            if (admin) {
                window.location.href = 'admin.html';
                return;
            }

            // 自动聚焦
            document.getElementById('adminUsername').focus();

            // 回车提交
            document.getElementById('adminLoginForm').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleAdminLoginSubmit();
                }
            });
        });

        // ==================== 密码可见性切换 ====================
        let passwordVisible = false;

        function togglePasswordVisibility() {
            const input = document.getElementById('adminPassword');
            const icon = document.getElementById('passwordToggleIcon');

            passwordVisible = !passwordVisible;

            if (passwordVisible) {
                input.type = 'text';
                icon.textContent = '🙈';
            } else {
                input.type = 'password';
                icon.textContent = '👁️';
            }
        }

        // ==================== 登录处理 ====================
        let isLoggingIn = false;

        async function handleAdminLoginSubmit() {
            if (isLoggingIn) return;

            const usernameInput = document.getElementById('adminUsername');
            const passwordInput = document.getElementById('adminPassword');
            const errorEl = document.getElementById('loginError');
            const btnText = document.getElementById('adminBtnText');
            const btnLoading = document.getElementById('adminBtnLoading');
            const loginBtn = document.getElementById('adminLoginBtn');

            // 清除错误
            errorEl.classList.remove('show');
            errorEl.textContent = '';

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            // 验证
            if (!username) {
                showLoginError('请输入用户名');
                usernameInput.focus();
                return;
            }

            if (!password) {
                showLoginError('请输入密码');
                passwordInput.focus();
                return;
            }

            // 开始登录
            isLoggingIn = true;
            loginBtn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');

            try {
                const result = await adminLogin(username, password);

                if (result.success) {
                    // 保存会话
                    saveAdminSession(username, password);

                    showToast('登录成功，欢迎管理员！', 'success');

                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 600);
                } else {
                    showLoginError(result.error || '用户名或密码错误');
                    passwordInput.value = '';
                    passwordInput.focus();

                    isLoggingIn = false;
                    loginBtn.disabled = false;
                    btnText.classList.remove('hidden');
                    btnLoading.classList.add('hidden');
                }
            } catch (err) {
                console.error('管理员登录异常:', err);
                showLoginError('网络异常，请稍后重试');

                isLoggingIn = false;
                loginBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        }

        /**
         * 显示登录错误
         * @param {string} message
         */
        function showLoginError(message) {
            const errorEl = document.getElementById('loginError');
            errorEl.textContent = '❌ ' + message;
            errorEl.classList.add('show');

            // 移除动画后重新添加以触发动画
            errorEl.style.animation = 'none';
            errorEl.offsetHeight; // 强制重绘
            errorEl.style.animation = '';
        }
    </script>
</body>

</html>
