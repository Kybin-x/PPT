<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPT学习站 · WPS演示课程</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/home.css">
</head>
<body>

<!-- ═══ 顶部导航 ═══ -->
<header class="home-header">
    <div class="header-inner">
        <div class="header-logo">
            <span class="logo-icon">🎯</span>
            <span class="logo-text">PPT学习站</span>
        </div>
        <div class="header-right">
            <div class="user-card" id="user-card">
                <span class="user-avatar" id="user-avatar">?</span>
                <div class="user-detail">
                    <span class="user-name" id="user-name">未登录</span>
                    <span class="user-meta" id="user-meta">—</span>
                </div>
            </div>
            <button class="theme-btn" id="theme-btn" title="切换主题">🌙</button>
            <button class="logout-btn" onclick="logout()">退出</button>
        </div>
    </div>
</header>

<!-- ═══ 主体 ═══ -->
<main class="home-main">

    <!-- 进度横幅 -->
    <section class="progress-banner">
        <div class="progress-banner-inner">
            <div class="progress-info">
                <h2 id="progress-title">课程进度</h2>
                <p id="progress-sub">正在加载...</p>
            </div>
            <div class="progress-right">
                <div class="big-progress-ring" id="progress-ring">
                    <svg viewBox="0 0 80 80">
                        <circle cx="40" cy="40" r="34" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="6"/>
                        <circle cx="40" cy="40" r="34" fill="none" stroke="#fff" stroke-width="6"
                            stroke-dasharray="213.6" stroke-dashoffset="213.6"
                            stroke-linecap="round" transform="rotate(-90 40 40)"
                            id="progress-ring-fill"/>
                    </svg>
                    <div class="ring-label" id="ring-label">0%</div>
                </div>
            </div>
        </div>
    </section>

    <!-- 课程大纲 -->
    <section class="course-section">
        <div class="section-header">
            <h2 class="section-title">📚 课程大纲</h2>
            <span class="section-sub" id="opened-tip"></span>
        </div>
        <div id="modules-container">
            <!-- 由JS渲染 -->
            <div style="text-align:center;padding:60px;color:var(--text-muted);">加载中...</div>
        </div>
    </section>

</main>

<!-- Toast -->
<div id="home-toast" class="home-toast hidden"></div>

<script src="js/supabase-config.js"></script>
<script src="js/supabase.min.js"></script>
<script src="js/theme.js"></script>

<script>
// ══════════════════════════════════════════════
//  课程结构定义
// ══════════════════════════════════════════════
const MODULES = [
    {
        name: '🌱 基础入门',
        desc: '认识WPS演示界面，掌握基础操作',
        lessons: [
            { num:1,  name:'初识WPS演示' },
            { num:2,  name:'新建与基本操作' },
            { num:3,  name:'文字排版' },
            { num:4,  name:'插入图片' },
            { num:5,  name:'形状与SmartArt' },
        ]
    },
    {
        name: '🎨 设计进阶',
        desc: '色彩、布局、图表、多媒体全覆盖',
        lessons: [
            { num:6,  name:'配色基础' },
            { num:7,  name:'版式与布局' },
            { num:8,  name:'图表制作' },
            { num:9,  name:'表格设计' },
            { num:10, name:'多媒体嵌入' },
        ]
    },
    {
        name: '⚡ 高效制作',
        desc: '对齐规范、素材技巧、协作分享',
        lessons: [
            { num:11, name:'对齐与规范' },
            { num:12, name:'素材处理' },
            { num:13, name:'统一风格' },
            { num:14, name:'审阅与协作' },
            { num:15, name:'打包与分享' },
        ]
    },
    {
        name: '✨ 动画与切换',
        desc: '让你的PPT动起来',
        lessons: [
            { num:16, name:'幻灯片切换效果' },
            { num:17, name:'元素动画效果' },
            { num:18, name:'排练计时与演讲者视图' },
        ]
    },
    {
        name: '📤 放映与输出',
        desc: '专业放映技巧与多格式导出',
        lessons: [
            { num:19, name:'放映设置与演示技巧' },
            { num:20, name:'PPT导出为多种格式' },
        ]
    },
    {
        name: '🤖 WPS特色功能',
        desc: 'AI工具、云文档、模板、母版设计',
        lessons: [
            { num:21, name:'WPS AI智能功能' },
            { num:22, name:'云文档与多端同步' },
            { num:23, name:'稻壳模板与资源库' },
            { num:24, name:'母版设计' },
        ]
    },
    {
        name: '🏆 综合实战',
        desc: '真实职场项目完整实战',
        lessons: [
            { num:25, name:'综合实战一：月度数据汇报' },
            { num:26, name:'综合实战二：产品发布会PPT' },
        ]
    },
];

const TOTAL_LESSONS = 26;

const { createClient } = supabase;
const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let student      = null;
let completedSet = new Set();
let maxAllowed   = TOTAL_LESSONS;

// ══════════════════════════════════════════════
//  初始化
// ══════════════════════════════════════════════
async function init() {
    const saved = sessionStorage.getItem('currentStudent');
    if (!saved) { window.location.href = 'login.html'; return; }
    student = JSON.parse(saved);

    // 从数据库刷新最新进度
    await refreshStudentFromDB();

    // 读取班级课程上限
    await loadClassLimit();

    // 渲染页面
    renderUserInfo();
    renderProgress();
    renderModules();
    initThemeBtn();
}

async function refreshStudentFromDB() {
    const { data, error } = await _supabase
        .from('students')
        .select('completed_lessons, last_active')
        .eq('id', student.id)
        .single();

    if (!error && data) {
        const cl = Array.isArray(data.completed_lessons) ? data.completed_lessons : [];
        completedSet = new Set(cl.map(Number));
        student.completed_lessons = cl;
        sessionStorage.setItem('currentStudent', JSON.stringify(student));
    } else {
        completedSet = new Set((student.completed_lessons || []).map(Number));
    }
}

async function loadClassLimit() {
    if (!student?.class_name) return;
    const key = 'class_lesson_limit_' + student.class_name;
    const { data } = await _supabase
        .from('system_settings')
        .select('value')
        .eq('key', key)
        .single();
    maxAllowed = data ? (parseInt(data.value) || TOTAL_LESSONS) : TOTAL_LESSONS;
}

// ══════════════════════════════════════════════
//  渲染用户信息
// ══════════════════════════════════════════════
function renderUserInfo() {
    document.getElementById('user-name').textContent = student.name || '—';
    document.getElementById('user-meta').textContent = `${student.class_name||''} · ${student.student_id||''}`;
    const initials = (student.name || '?').charAt(0);
    document.getElementById('user-avatar').textContent = initials;
}

// ══════════════════════════════════════════════
//  渲染进度横幅
// ══════════════════════════════════════════════
function renderProgress() {
    const completed = completedSet.size;
    const pct = Math.round(completed / TOTAL_LESSONS * 100);
    const circumference = 2 * Math.PI * 34; // ≈ 213.6

    document.getElementById('progress-title').textContent =
        `你好，${student.name}！`;
    document.getElementById('progress-sub').textContent =
        `已完成 ${completed} / ${maxAllowed <= TOTAL_LESSONS ? maxAllowed : TOTAL_LESSONS} 课（班级开放 ${maxAllowed} 课）`;

    // 进度圆环
    const fill = document.getElementById('progress-ring-fill');
    if (fill) {
        const offset = circumference * (1 - pct / 100);
        fill.style.strokeDashoffset = offset;
    }
    document.getElementById('ring-label').textContent = pct + '%';

    // 右上角提示
    const tip = document.getElementById('opened-tip');
    if (maxAllowed < TOTAL_LESSONS) {
        tip.textContent = `本班目前开放第 1–${maxAllowed} 课`;
        tip.style.color = 'var(--accent-warning)';
    } else {
        tip.textContent = `全部 ${TOTAL_LESSONS} 课已开放`;
        tip.style.color = 'var(--text-muted)';
    }
}

// ══════════════════════════════════════════════
//  渲染模块和课程卡片
// ══════════════════════════════════════════════
function renderModules() {
    const container = document.getElementById('modules-container');
    container.innerHTML = MODULES.map(mod => {
        // 判断模块内是否有开放的课
        const hasOpen = mod.lessons.some(l => l.num <= maxAllowed);
        if (!hasOpen) return ''; // 完全未开放的模块不显示

        const lessonCards = mod.lessons.map(l => {
            const done    = completedSet.has(l.num);
            const locked  = l.num > maxAllowed;
            const current = !locked && !done && (l.num === 1 || completedSet.has(l.num - 1));
            const prev    = !locked && !done && !current && l.num > 1 && !completedSet.has(l.num - 1);

            let statusClass = '';
            if (locked)       statusClass = 'locked';
            else if (done)    statusClass = 'done';
            else if (current) statusClass = 'current';

            let statusBadge = '';
            if (locked)       statusBadge = '<span class="lesson-badge-status locked-badge">🔒 未开放</span>';
            else if (done)    statusBadge = '<span class="lesson-badge-status done-badge">✓ 已完成</span>';
            else if (current) statusBadge = '<span class="lesson-badge-status current-badge">▶ 开始学习</span>';
            else              statusBadge = '<span class="lesson-badge-status todo-badge">待解锁</span>';

            return `
            <div class="lesson-card ${statusClass}" onclick="openLesson(${l.num}, ${locked}, ${prev})" title="${l.name}">
                <div class="lesson-card-num">第 ${l.num} 课</div>
                <div class="lesson-card-name">${l.name}</div>
                ${statusBadge}
            </div>`;
        }).join('');

        return `
        <div class="module-block">
            <div class="module-header">
                <div class="module-title">${mod.name}</div>
                <div class="module-desc">${mod.desc}</div>
            </div>
            <div class="module-lessons">
                ${lessonCards}
            </div>
        </div>`;
    }).join('');
}

function openLesson(num, locked, prevNotDone) {
    if (locked) {
        showToast(`⚠️ 本课尚未开放，班级目前开放到第 ${maxAllowed} 课`, 'warning');
        return;
    }
    if (prevNotDone && num > 1) {
        showToast('⚠️ 请先完成上一课，再继续学习', 'warning');
        return;
    }
    window.location.href = `lesson.html?lesson=${num}`;
}

// ══════════════════════════════════════════════
//  主题
// ══════════════════════════════════════════════
function initThemeBtn() {
    const btn = document.getElementById('theme-btn');
    if (!btn) return;
    const update = () => {
        btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
    };
    update();
    btn.onclick = () => { if (window._themeManager) { window._themeManager.toggle(); update(); } };
}

// ══════════════════════════════════════════════
//  Toast
// ══════════════════════════════════════════════
let _toastTimer = null;
function showToast(msg, type = 'info') {
    const t = document.getElementById('home-toast');
    t.textContent = msg;
    t.className = `home-toast show ${type}`;
    if (_toastTimer) clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

function logout() {
    sessionStorage.removeItem('currentStudent');
    window.location.href = 'login.html';
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
